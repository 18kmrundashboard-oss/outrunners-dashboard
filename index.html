<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Outrunners Community UK</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;800&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- Leaflet & GPX -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/2.1.2/gpx.min.js"></script>
    
    <!-- Custom Style -->
    <link rel="stylesheet" href="outrunners.css">
</head>
<body>
    <div class="bg-glow"></div>
    <div class="bg-glow-bottom"></div>

    <div class="dashboard-container">
        <header class="animate-up">
            <div class="logo">
                OUTRUNNERS <span>⚡</span> CLUB
            </div>
            <div class="header-info">
                <p style="text-align: right; font-size: 0.9rem; color: var(--text-muted);">REHAB CITY CHAPTER</p>
                <p class="neon-text" style="font-weight: 700;">PERFORMANCE DASHBOARD</p>
            </div>
        </header>

        <div class="section-grid">
            <!-- Route Visualizer -->
            <div class="col-12 glass-card animate-up">
                <h2 style="margin-bottom: 1.5rem;">📍 Route Visualizer</h2>
                <div id="map"></div>
                <div class="map-controls">
                    <input type="file" id="gpxUpload" accept=".gpx" style="display: none;">
                    <button class="btn btn-primary" onclick="document.getElementById('gpxUpload').click()">Upload Strava GPX</button>
                    <p id="fileName" style="align-self: center; color: var(--text-muted); font-size: 0.9rem;"></p>
                </div>
            </div>

            <!-- Pace & Splits -->
            <div class="col-8 glass-card animate-up" style="animation-delay: 0.4s;" id="paceCard">
                <h2 style="margin-bottom: 1.5rem;">⏱ Pace & Splits</h2>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 2rem;">
                    <div>
                        <label>Target 18K Time (HH:MM:SS)</label>
                        <input type="text" id="targetTime" placeholder="e.g. 01:12:00" value="01:20:00">
                    </div>
                    <div>
                        <label>Required Pace/KM</label>
                        <div id="requiredPace" class="neon-text" style="font-size: 1.8rem; font-weight: 800; font-family: var(--font-heading); margin-top: 0.5rem;">--:--</div>
                    </div>
                </div>
                <div id="statusLabel" class="glass-card" style="padding: 1rem; text-align: center; border-color: transparent;">
                    <span style="font-weight: 700;">TARGET STATUS:</span> <span id="statusText">READY</span>
                </div>
            </div>

            <!-- Community Leaderboard -->
            <div class="col-4 glass-card animate-up" style="animation-delay: 0.6s;">
                <h2 style="margin-bottom: 1.5rem;">🏆 Top Outrunners</h2>
                <ul class="leaderboard-list">
                    <li class="leaderboard-item">
                        <div class="runner-info">
                            <span class="runner-rank">01</span>
                            <span class="runner-name">Alex M.</span>
                        </div>
                        <span class="runner-stat">1:08:45</span>
                    </li>
                    <li class="leaderboard-item">
                        <div class="runner-info">
                            <span class="runner-rank">02</span>
                            <span class="runner-name">Sarah K.</span>
                        </div>
                        <span class="runner-stat">1:12:30</span>
                    </li>
                </ul>
                <button class="btn btn-outline" style="width: 100%; margin-top: 1.5rem; font-size: 0.8rem;">View Full Table</button>
            </div>
        </div>

        <footer style="margin-top: 4rem; padding-bottom: 2rem; text-align: center; color: var(--text-muted); font-size: 0.8rem;">
            &copy; 2026 Outrunners Community UK. Engineered for High Performance.
        </footer>
    </div>

    <!-- Script -->
    <script src="outrunners.js"></script>
</body>
</html>
